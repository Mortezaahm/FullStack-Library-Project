<div class="container mt-5">
  <h2>My Quotes</h2>

  <div class="input-group mb-3" *ngIf="!isEditing">
    <input [(ngModel)]="newQuote" type="text" class="form-control" placeholder="Write a quote" />
    <button class="btn btn-primary" (click)="submit()">Add</button>
  </div>

  <div *ngIf="isEditing">
    <input [(ngModel)]="editQuote.text" type="text" class="form-control mb-2" />
    <button class="btn btn-success" (click)="submit()">Save</button>
    <button class="btn btn-secondary" (click)="router.navigate(['/quotes'])">Cancel</button>
  </div>

  <ul class="list-group mt-3">
    <li
      class="list-group-item d-flex justify-content-between align-items-center"
      *ngFor="let q of quotes"
    >
      {{ q.text }}
      <span>
        <button class="btn btn-sm btn-warning me-2" [routerLink]="['/quotes/edit', q.id]">
          Edit
        </button>
        <button class="btn btn-sm btn-danger" (click)="delete(q.id)">Delete</button>
      </span>
    </li>
  </ul>
</div>
