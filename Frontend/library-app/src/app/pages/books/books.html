<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Books</h2>
    <button class="btn btn-primary me-2" routerLink="/books/new">Add Book</button>
    <button class="btn btn-danger" (click)="logout()">Logout</button>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let book of books">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ book.title }}</h5>
          <p class="card-text">Author: {{ book.author }}</p>
          <p class="card-text">Published: {{ book.publishDate | date: 'longDate' }}</p>
          <button class="btn btn-warning me-2" [routerLink]="['/books/edit', book.id]">Edit</button>

          <button class="btn btn-danger" (click)="delete(book.id)">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>
