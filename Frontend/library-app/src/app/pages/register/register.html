<div class="container mt-5" style="max-width: 400px">
  <div class="card shadow p-4">
    <h3 class="card-title text-center mb-3">Register</h3>
    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label>Email</label>
        <input [(ngModel)]="email" name="email" type="email" class="form-control" required />
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          class="form-control"
          required
        />
      </div>
      <div class="mb-3">
        <label>Confirm Password</label>
        <input
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          type="password"
          class="form-control"
          required
        />
      </div>
      <div *ngIf="error" class="text-danger mb-2">{{ error }}</div>
      <button class="btn btn-success w-100">Register</button>
    </form>
    <div class="mt-3 text-center">
      <a routerLink="/">Already have an account? Login</a>
    </div>
  </div>
</div>
